<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream up store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1557683316-973673baf926') no-repeat center/cover;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
    }
    .card {
      position: relative;
      max-width: 350px;
      margin: 50px auto;
      background: #111;
      color: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 1;
      text-align: center;
    }
    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
    }
    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .buy {
      background: gold;
      width: 100%;
      margin-top: 10px;
    }
    .modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 5;
    }
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="card">
    <h1 style="color:gold;">Dream up store</h1>

    <img src="https://p.turbosquid.com/ts-thumb/hz/65Vq14/B9/rocket_sistem_perspective_fr/jpg/1695149384/600x600/fit_q87/3750fb58bc872d4db107c5342bf8cb2473f97194/rocket_sistem_perspective_fr.jpg">

    <h2>Festive launcher</h2>
    <p>Is a brillian product evolving the safty of kids and making a better experience on events</p>

    <p style="color:lightgreen; font-size:20px;">
      $50 <span style="color:gray; font-size:12px;">(antes $66)</span>
    </p>

    <div>
      <button onclick="menos()">-</button>
      <span id="cantidad">1</span>
      <button onclick="mas()">+</button>
    </div>

    <p>Total: $<span id="total">50</span></p>

    <button class="buy" onclick="abrirModal()">Comprar</button>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Pago con PayPal</h2>
      <p>Total: $<span id="total2">50</span></p>

      <input placeholder="Nombre">
      <input placeholder="Correo">
      <input placeholder="País">
      <input placeholder="Número de tarjeta">

      <button onclick="comprar()">Pagar ahora</button>
      <button onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>

  <script>
    let cantidad = 1;
    const precio = 50;

    function actualizar() {
      document.getElementById('cantidad').innerText = cantidad;
      document.getElementById('total').innerText = cantidad * precio;
      document.getElementById('total2').innerText = cantidad * precio;
    }

    function mas() {
      cantidad++;
      actualizar();
    }

    function menos() {
      if (cantidad > 1) cantidad--;
      actualizar();
    }

    function abrirModal() {
      document.getElementById('modal').style.display = 'flex';
      actualizar();
    }

    function cerrarModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function comprar() {
      cerrarModal();
      setTimeout(() => {
        alert('Compra exitosa ✅');
      }, 100);
    }
  </script>
</body>
</html>
