<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda Online</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }
    h1 {
      text-align: center;
      padding: 20px;
      color: gold;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
    }
    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: gold;
      cursor: pointer;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    .modal-content {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }
  </style>
</head>
<body>

<h1>Dream up store</h1>

<div class="grid">
  <div class="card">
    <img src="https://i.ibb.co/pmhH444/Mi-otra-imagen-lol.jpg">
    <h3>Festive launcher</h3>
    <p>$50 (antes $66)</p>
    <button onclick="verProducto('producto1.html')">Ver</button>
  </div>

  <div class="card">
    <img src="https://i.ibb.co/4ZntDLkF/mi-imagen.png">
    <h3>dream up shoes</h3>
    <p>$30 (antes $40)</p>
    <button onclick="verProducto('producto2.html')">Ver</button>
  </div>

  <div class="card">
    <img src="https://i.ibb.co/zVWHmwyR/mi-otra-otra-imagen-lol.png">
    <h3>Dream up shirt</h3>
    <p>$15 (antes $27)</p>
    <button onclick="verProducto('producto3.html')">Ver</button>
  </div>
</div>

<script>
  function verProducto(archivo) {
    window.location.href = archivo;
  }
</script>

</body>
</html>
